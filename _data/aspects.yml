- title: Trust through uncommon ground
  description: Uncommon Ground is a powerful concept because it reflects how meaningful deliberation often creates new shared understanding—not just compromise, but a richer, collective perspective that emerges from engaging with diverse views.
- title: Non-addictive, democratic design
- title: Open, auditable, and adaptable
- title: Community-governed digital commons
- title: From local to EU wide discussions
  description: Voxit can be used in both small scale community oriented participation, as well as cross-border conversation involving thousands of people
- title: Citizen assemblies
  description: Voxit is a proven tool for supporting citizen assemblies to involved broader groups online
- title: European collaboration
  description: Voxit EU brings together national and local Voxit initiatives, sharing learnings, best practices and open code
- title: Voxit is Digital Public Infrastructure (DPI)
  description: Voxit aligns with the UNDP’s definition of Digital Public Infrastructure (DPI)—a set of shared digital systems that are secure, interoperable, and governed by public rules to ensure equitable access and respect for human rights. Voxit is designed as open-source software that users can deploy on their own infrastructure or use as a managed service. It is built to be interoperable and governed by public rules.
- title: Voxit is part of the Civic Tech infrastructure of Europe
  description: Voxit contributes to a growing European ecosystem for digital participation infrastructure, aligning with initiatives like the EU Civic Tech Hub. This coordination helps connect projects, communities, and public institutions across Europe.
- title: Policymakers
  description: Voxit can easily be used and deployed in your own local context. Connect with local companies and stakeholder and start using Voxit today
- title: Civic tech
  description: Voxit is part of the European Civic Tech ecosystem. With Voxit EU we hope to join forces and align with other strong initiatives in this field
- title: Open Source
  description: We invite new contributors to help shape the future of democratic technology.